name: Snake Contrib

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            profile-snake-contrib/github-contribution-grid-snake.svg
            profile-snake-contrib/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit generated files
        run: |
          if [[ -n "$(git status --porcelain profile-snake-contrib)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add profile-snake-contrib
            git commit -m "chore: update snake contribution graph"
            git push
          fi
