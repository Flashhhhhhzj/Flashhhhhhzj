<svg xmlns="http://www.w3.org/2000/svg" width="430" height="260" viewBox="0 0 430 260" role="img" aria-labelledby="title desc">
  <title id="title">Pinned repositories placeholder</title>
  <desc id="desc">Run the GitHub Metrics workflow to replace this placeholder.</desc>
  <rect width="430" height="260" rx="20" fill="#f8fbff" stroke="#dbeafe" />
  <text x="28" y="52" fill="#0f172a" font-size="24" font-family="Arial, sans-serif" font-weight="700">Pinned Repositories</text>
  <text x="28" y="86" fill="#64748b" font-size="16" font-family="Arial, sans-serif">Your featured repositories will appear here.</text>
  <g fill="#ffffff" stroke="#dbeafe">
    <rect x="28" y="118" width="170" height="96" rx="14" />
    <rect x="214" y="118" width="170" height="96" rx="14" />
  </g>
</svg>
