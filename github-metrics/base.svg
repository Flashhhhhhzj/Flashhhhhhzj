<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Metrics placeholder</title>
  <desc id="desc">Run the GitHub Metrics workflow to replace this placeholder with a generated SVG.</desc>
  <rect width="900" height="420" rx="24" fill="#0f172a" />
  <text x="48" y="84" fill="#f8fafc" font-size="34" font-family="Arial, sans-serif" font-weight="700">
    GitHub Metrics
  </text>
  <text x="48" y="126" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">
    This card will be generated by .github/workflows/metrics.yml
  </text>
  <g fill="#111827" stroke="#334155">
    <rect x="48" y="170" width="250" height="180" rx="18" />
    <rect x="324" y="170" width="250" height="180" rx="18" />
    <rect x="600" y="170" width="250" height="180" rx="18" />
  </g>
  <text x="78" y="218" fill="#14b8a6" font-size="18" font-family="Arial, sans-serif">Header</text>
  <text x="78" y="252" fill="#94a3b8" font-size="16" font-family="Arial, sans-serif">Profile summary</text>
  <text x="354" y="218" fill="#38bdf8" font-size="18" font-family="Arial, sans-serif">Activity</text>
  <text x="354" y="252" fill="#94a3b8" font-size="16" font-family="Arial, sans-serif">Recent events and lines changed</text>
  <text x="630" y="218" fill="#f59e0b" font-size="18" font-family="Arial, sans-serif">Repositories</text>
  <text x="630" y="252" fill="#94a3b8" font-size="16" font-family="Arial, sans-serif">Pinned work and traffic</text>
</svg>
